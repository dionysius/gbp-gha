# Creates a GitHub release from artifacts uploaded by previous jobs. The changelog
# body is extracted from the Debian changelog. Duplicate .orig.tar.gz files are
# deduplicated. Artifact attestations are generated for all release assets.
#
# Expects artifacts uploaded under names matching results_<distro>_<arch> (as
# produced by build.yml), each containing the Debian build output files.
#
# File uploads are always done through a draft release first to support immutable-release
# repositories. When publish is true, the draft is published afterwards, otherwise the
# release remains as a draft.
name: create release with artifacts

on:
  workflow_call:
    inputs:
      prerelease:
        description: 'Mark release as pre-release'
        type: boolean
        default: false
      publish:
        description: 'Publish release (otherwise will create a draft release)'
        type: boolean
        default: false

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:

  release:
    runs-on: ubuntu-latest

    steps:
      - name: check out
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          path: source
      - name: download artifacts
        uses: actions/download-artifact@v7
      - name: prepare changelog
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev
          pushd source
          dpkg-parsechangelog -S Changes | tail -n+4 > ../changelog
          popd
      - name: only one orig
        run: |
          find . -name "*.orig.tar.gz" | sort | tail -n +2 | xargs -r rm
      - name: generate artifact attestations
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: 'results_*/*'
      - name: create release with assets
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          prerelease: ${{ inputs.prerelease }}
          fail_on_unmatched_files: true
          body_path: changelog
          files: |
            results_*/*
      - name: publish release
        if: ${{ inputs.publish }}
        uses: actions/github-script@v8
        with:
          script: |
            const tag = process.env.GITHUB_REF_NAME;
            const releases = await github.paginate(github.rest.repos.listReleases, {
              owner: context.repo.owner,
              repo: context.repo.repo
            });
            const release = releases.find(r => r.tag_name === tag);
            if (!release) {
              throw new Error(`No release found for tag ${tag}`);
            }
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.id,
              draft: false
            });
